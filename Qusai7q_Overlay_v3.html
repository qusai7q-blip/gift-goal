<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Qusai_7q Overlay</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1080px; height:1920px;
  background: transparent;
  font-family: 'Arial Black', sans-serif;
  overflow: hidden;
  position: relative;
}

/* ── GIFT GOAL BAR ── */
.gift-goal {
  position: absolute;
  bottom: 210px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  background: linear-gradient(135deg, rgba(5,0,20,0.95), rgba(20,0,40,0.95));
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 16px;
  padding: 18px 28px;
  box-shadow: 0 0 30px rgba(0,200,255,0.15), 0 0 15px rgba(170,0,255,0.15);
  animation: fadeUp 1s ease 0.5s forwards;
  opacity: 0;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateX(-50%) translateY(10px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}

.goal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.goal-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #00e5ff;
  text-transform: uppercase;
}

.goal-count {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(90deg, #00e5ff, #aa00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.goal-bar-bg {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.goal-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00e5ff, #aa00ff, #ff00c8);
  border-radius: 6px;
  transition: width 1s ease;
  position: relative;
  animation: fillBar 2s ease 1s forwards;
}

@keyframes fillBar {
  from { width: 0%; }
  to   { width: var(--fill); }
}

.goal-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 40px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5));
  animation: shimBar 2s ease-in-out infinite;
}

@keyframes shimBar {
  0%,100% { opacity:0.5; }
  50%      { opacity:1; }
}

.goal-emoji {
  font-size: 20px;
  margin-right: 8px;
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 200px;
  background: linear-gradient(135deg, rgba(5,0,20,0.92), rgba(20,0,40,0.95));
  border-top: 2px solid transparent;
  border-image: linear-gradient(90deg, #00e5ff, #aa00ff, #ff00c8) 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 35px;
  box-shadow: 0 -8px 50px rgba(0,200,255,0.2), 0 -4px 20px rgba(180,0,255,0.15);
}

.logo-wrap { display:flex; flex-direction:column; gap:10px; }

.logo-text {
  font-size: 54px;
  font-weight: 900;
  font-style: italic;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #00e5ff 0%, #aa00ff 50%, #ff00c8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 14px rgba(0,200,255,0.7));
  animation: colorShift 4s ease-in-out infinite;
}

@keyframes colorShift {
  0%,100% { filter: drop-shadow(0 0 14px rgba(0,200,255,0.8)); }
  33%      { filter: drop-shadow(0 0 18px rgba(170,0,255,0.8)); }
  66%      { filter: drop-shadow(0 0 18px rgba(255,0,200,0.8)); }
}

.live-section { display:flex; flex-direction:column; align-items:center; gap:12px; }

.live-badge {
  display: flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, #aa00ff, #ff00c8);
  padding: 10px 24px;
  border-radius: 30px;
  color: white;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 3px;
  box-shadow: 0 0 20px rgba(180,0,255,0.6);
  animation: livePulse 1.5s ease-in-out infinite;
}

.live-dot {
  width: 12px; height: 12px;
  background: #00e5ff;
  border-radius: 50%;
  box-shadow: 0 0 8px #00e5ff;
  animation: blinkDot 1s ease-in-out infinite;
}

@keyframes livePulse {
  0%,100% { box-shadow: 0 0 20px rgba(180,0,255,0.6); }
  50%      { box-shadow: 0 0 35px rgba(255,0,200,0.8); }
}
@keyframes blinkDot {
  0%,100% { opacity:1; }
  50%      { opacity:0.3; }
}

.follower-count {
  color: #00e5ff;
  font-size: 17px;
  font-weight: 700;
  background: rgba(0,200,255,0.1);
  padding: 8px 18px;
  border-radius: 20px;
  border: 1px solid rgba(0,200,255,0.4);
  letter-spacing: 1px;
}

/* ── DONATION ALERT ── */
.donation-alert {
  position: absolute;
  bottom: 430px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #0a0020, #1a0035);
  border: 2px solid;
  border-image: linear-gradient(135deg, #00e5ff, #aa00ff, #ff00c8) 1;
  padding: 24px 50px;
  border-radius: 18px;
  color: white;
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,200,255,0.3), 0 4px 20px rgba(180,0,255,0.3);
  display: none;
  min-width: 520px;
}

.donation-alert.show {
  display: block;
  animation: popIn 0.6s cubic-bezier(0.23,1,0.32,1) forwards;
}
.donation-alert.hide {
  animation: popOut 0.5s ease-in forwards;
}

.donation-name { color:#00e5ff; font-size:22px; margin-bottom:6px; }
.donation-amount {
  background: linear-gradient(90deg, #00e5ff, #aa00ff, #ff00c8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 36px;
}
.coin-icon { font-size:40px; display:block; margin-bottom:8px; animation: spin 1s linear infinite; }

@keyframes popIn {
  0%   { opacity:0; transform:translateX(-50%) scale(0.5); }
  70%  { transform:translateX(-50%) scale(1.06); }
  100% { opacity:1; transform:translateX(-50%) scale(1); }
}
@keyframes popOut {
  0%   { opacity:1; transform:translateX(-50%) scale(1); }
  100% { opacity:0; transform:translateX(-50%) scale(0.7) translateY(-30px); }
}
@keyframes spin { 100% { transform:rotate(360deg); } }

/* ── CORNERS ── */
.corner { position:fixed; width:32px; height:32px; }
.c-tl { top:18px; left:18px;  border-top:2px solid #00e5ff; border-left:2px solid #00e5ff; }
.c-tr { top:18px; right:18px; border-top:2px solid #ff00c8; border-right:2px solid #ff00c8; }
.c-bl { bottom:18px; left:18px;  border-bottom:2px solid #aa00ff; border-left:2px solid #aa00ff; }
.c-br { bottom:18px; right:18px; border-bottom:2px solid #00e5ff; border-right:2px solid #00e5ff; }

/* ── PARTICLES ── */
.particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  animation: floatUp var(--dur) ease-out var(--delay) infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { opacity:0.8; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-80px) scale(0); }
}

.shimmer-line {
  position: absolute;
  bottom: 200px; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, #00e5ff, #aa00ff, #ff00c8, transparent);
  animation: shimmerSweep 3s ease-in-out infinite;
  opacity: 0.6;
}
@keyframes shimmerSweep {
  0%,100% { opacity:0.3; }
  50%      { opacity:0.8; }
}
</style>
</head>
<body>

<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>
<div class="shimmer-line"></div>

<!-- Gift Goal -->
<div class="gift-goal">
  <div class="goal-header">
    <div class="goal-title"><span class="goal-emoji">🎁</span> Gift Goal</div>
    <div class="goal-count" id="goalCount">0 / 3219</div>
  </div>
  <div class="goal-bar-bg">
    <div class="goal-bar-fill" id="goalFill" style="--fill: 0%"></div>
  </div>
</div>

<!-- Donation Alert -->
<div class="donation-alert" id="donationAlert">
  <span class="coin-icon">🪙</span>
  <div class="donation-name" id="donorName">Fan123</div>
  <div class="donation-amount" id="donationAmt">500 Coins! 🎉</div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="logo-wrap">
    <div class="logo-text">Qusai_7q</div>
  </div>
  <div class="live-section">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="follower-count">👥 3K Followers</div>
  </div>
</div>

<script>
// Particles
const colors = ['#00e5ff','#aa00ff','#ff00c8','#ffffff'];
for(let i=0;i<20;i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random()*100+'%';
  p.style.bottom = (200 + Math.random()*250)+'px';
  p.style.background = colors[Math.floor(Math.random()*colors.length)];
  p.style.boxShadow = `0 0 6px ${colors[Math.floor(Math.random()*colors.length)]}`;
  p.style.setProperty('--dur', (2+Math.random()*3)+'s');
  p.style.setProperty('--delay', (Math.random()*4)+'s');
  document.body.appendChild(p);
}

// Gift goal update
let current = 0;
const target = 3219;

function updateGoal(amount) {
  current = Math.min(current + amount, target);
  const pct = (current / target) * 100;
  document.getElementById('goalFill').style.width = pct + '%';
  document.getElementById('goalCount').textContent = current + ' / ' + target;
}

// Donation alert
function showDonation(username, amount) {
  updateGoal(amount);
  const alert = document.getElementById('donationAlert');
  document.getElementById('donorName').textContent = username;
  document.getElementById('donationAmt').textContent = amount + ' Coins! 🎉';
  alert.className = 'donation-alert show';
  setTimeout(() => {
    alert.className = 'donation-alert hide';
    setTimeout(() => { alert.className = 'donation-alert'; }, 500);
  }, 4000);
}

// Test — uncomment to preview:
// setTimeout(() => showDonation("BigFan", 500), 2000);
</script>

</body>
</html>
